<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Full Video</title>

  <style>
    *{
      margin:0;
      padding:0;
      box-sizing:border-box;
    }

    body{
      overflow:hidden;
      background:black;
    }

    .video-container{
      position:relative;
      width:100vw;
      height:100vh;
    }

    video{
      width:100%;
      height:100%;
      object-fit:cover;
    }

    .btn{
      position:absolute;
      top:50%;
      left:50%;
      transform:translate(-50%, -50%);
      width:90px;
      height:90px;
      border:none;
      border-radius:50%;
      background:rgba(0,0,0,0.5);
      color:white;
      font-size:30px;
      cursor:pointer;
      transition:0.3s;
    }

    .btn:hover{
      background:rgba(255,255,255,0.3);
    }
  </style>
</head>
<body>

<div class="video-container">
  
 <video id="myVideo" controls loop>
  <source src="video.mp4" type="video/mp4">
</video>

  <button class="btn" id="playPauseBtn">⏸</button>

</div>

<script>
  const video = document.getElementById("myVideo");
  const btn = document.getElementById("playPauseBtn");

  btn.addEventListener("click", () => {

    if(video.paused){
      video.play();
      btn.innerHTML = "⏸";
    } else {
      video.pause();
      btn.innerHTML = "▶";
    }

  });
</script>

</body>
</html>
